<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Ember 8 mark">
  <!-- Ember 8 — a coarse glowing coal: few large pixels, two warm colors. -->
  <g shape-rendering="crispEdges">
    <!-- body: ember orange #FF7A45 -->
    <g fill="#FF7A45">
      <rect x="18" y="6"  width="6" height="6"/><rect x="24" y="6"  width="6" height="6"/>
      <rect x="12" y="12" width="6" height="6"/><rect x="18" y="12" width="6" height="6"/><rect x="24" y="12" width="6" height="6"/><rect x="30" y="12" width="6" height="6"/>
      <rect x="6"  y="18" width="6" height="6"/><rect x="12" y="18" width="6" height="6"/><rect x="30" y="18" width="6" height="6"/><rect x="36" y="18" width="6" height="6"/>
      <rect x="6"  y="24" width="6" height="6"/><rect x="12" y="24" width="6" height="6"/><rect x="30" y="24" width="6" height="6"/><rect x="36" y="24" width="6" height="6"/>
      <rect x="6"  y="30" width="6" height="6"/><rect x="12" y="30" width="6" height="6"/><rect x="18" y="30" width="6" height="6"/><rect x="24" y="30" width="6" height="6"/><rect x="30" y="30" width="6" height="6"/><rect x="36" y="30" width="6" height="6"/>
      <rect x="12" y="36" width="6" height="6"/><rect x="18" y="36" width="6" height="6"/><rect x="24" y="36" width="6" height="6"/><rect x="30" y="36" width="6" height="6"/>
    </g>
    <!-- core: molten gold #E8BE3C -->
    <g fill="#E8BE3C">
      <rect x="18" y="18" width="6" height="6"/><rect x="24" y="18" width="6" height="6"/>
      <rect x="18" y="24" width="6" height="6"/><rect x="24" y="24" width="6" height="6"/>
    </g>
  </g>
</svg>
