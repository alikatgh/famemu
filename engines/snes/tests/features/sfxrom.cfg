# 64 KB SuperFX image (LoROM layout; expansion-RAM byte lives at $FFBD).
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    BSS:  start = $0200, size = $1B00, type = rw;
    ROM0: start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    ROM1: start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $A5;
}
SEGMENTS {
    ZEROPAGE:   load = ZP,   type = zp;
    BSS:        load = BSS,  type = bss;
    CODE:       load = ROM0, start = $8000, type = ro;
    RODATA:     load = ROM0, type = ro;
    EXTHEADER:  load = ROM0, start = $FFB0, type = ro;
    SNESHEADER: load = ROM0, start = $FFC0, type = ro;
    VECTORS:    load = ROM0, start = $FFE4, type = ro;
    FILLER:     load = ROM1, type = ro, optional = yes;
}
