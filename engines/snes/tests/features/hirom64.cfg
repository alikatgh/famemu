# 64 KB HiROM image for engine test ROMs (ca65/ld65).
# File offset $0000-$7FFF = CPU $C00000+ (data); $8000-$FFFF = CPU 00:8000
# (code, header at $FFC0).
MEMORY {
    ZP:    start = $0000, size = $0100, type = rw;
    BSS:   start = $0200, size = $1B00, type = rw;
    ROMLO: start = $0000, size = $8000, type = ro, file = %O, fill = yes, fillval = $A5;
    ROMHI: start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}
SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp;
    BSS:        load = BSS,   type = bss;
    MARKER:     load = ROMLO, start = $0000, type = ro;
    CODE:       load = ROMHI, start = $8000, type = ro;
    RODATA:     load = ROMHI, type = ro;
    SNESHEADER: load = ROMHI, start = $FFC0, type = ro;
    VECTORS:    load = ROMHI, start = $FFE4, type = ro;
}
