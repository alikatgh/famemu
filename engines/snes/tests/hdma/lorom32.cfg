# Minimal 32 KB LoROM for engine test ROMs (ca65/ld65).
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    BSS:  start = $0200, size = $1B00, type = rw;
    ROM:  start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
}
SEGMENTS {
    ZEROPAGE:   load = ZP,  type = zp;
    BSS:        load = BSS, type = bss;
    CODE:       load = ROM, start = $8000, type = ro;
    RODATA:     load = ROM, type = ro;
    SNESHEADER: load = ROM, start = $FFC0, type = ro;
    VECTORS:    load = ROM, start = $FFE4, type = ro;
}
